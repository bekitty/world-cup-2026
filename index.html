<!DOCTYPE html>
<html lang="zh-CN" dir="ltr">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root {
  --bg:#030711; --bg2:#080f1f; --card:#0d1426; --card-hover:#111b33;
  --border:#1c2a4a; --border-bright:#2a3f6a;
  --gold:#f0a500; --gold-dim:#a07010; --gold-light:#ffd166;
  --text:#dde3f0; --text2:#7888aa; --text3:#4a5a7a;
  --live:#ff4757; --live-bg:rgba(255,71,87,0.12);
  --green:#2ecc71; --r32:#00b4d8; --r16:#48cae4; --qf:#90e0ef;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(240,165,0,0.07) 0%,transparent 70%),
             radial-gradient(ellipse 60% 40% at 20% 100%,rgba(0,50,120,0.12) 0%,transparent 60%),
             radial-gradient(ellipse 60% 40% at 80% 100%,rgba(0,50,120,0.12) 0%,transparent 60%);
  pointer-events:none;z-index:0;}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:rgba(3,7,17,0.94);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.header-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:10px;padding:10px 20px;flex-wrap:wrap;}
.brand{flex:1;min-width:150px;}
.brand-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--gold);line-height:1;}
.brand-sub{font-size:10px;font-weight:500;color:var(--text2);letter-spacing:3px;text-transform:uppercase;margin-top:1px;}
.header-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}

/* Lang toggle */
.lang-toggle{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.lang-btn{padding:5px 10px;border:none;background:transparent;color:var(--text2);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;}
.lang-btn.active{background:var(--gold);color:var(--bg);}
.lang-btn:not(.active):hover{color:var(--text);}

/* TZ toggle */
.tz-toggle{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:6px;overflow:hidden;position:relative;}
.tz-btn{padding:5px 12px;border:none;background:transparent;color:var(--text2);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:color .15s;white-space:nowrap;position:relative;z-index:1;}
.tz-btn.active{color:var(--bg);}
.tz-slider{position:absolute;top:2px;bottom:2px;background:var(--gold);border-radius:4px;transition:left .25s cubic-bezier(.4,0,.2,1),width .25s;pointer-events:none;}

/* Clock */
.live-clock{font-family:'JetBrains Mono',monospace;text-align:right;min-width:90px;}
.clock-label{font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;}
.clock-time{font-size:15px;font-weight:500;color:var(--text);}

/* FILTERS */
.filters{position:sticky;top:61px;z-index:90;background:rgba(3,7,17,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.filters-inner{max-width:960px;margin:0 auto;display:flex;gap:4px;padding:8px 20px;overflow-x:auto;scrollbar-width:none;}
.filters-inner::-webkit-scrollbar{display:none;}
.filt-btn{padding:4px 12px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;border-radius:20px;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.filt-btn:hover{border-color:var(--gold-dim);color:var(--gold);}
.filt-btn.active{background:var(--gold);border-color:var(--gold);color:var(--bg);}
.filt-sep{width:1px;background:var(--border);margin:0 4px;flex-shrink:0;}

/* MAIN */
main{max-width:960px;margin:0 auto;padding:20px;position:relative;z-index:1;}

/* DATE GROUP */
.date-group{margin-bottom:28px;}
.date-group.hidden{display:none;}
.date-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.date-label{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--text);}
.date-label.is-today{color:var(--gold);}
.date-badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:2px;}
.date-badge.today-badge{background:var(--gold);color:var(--bg);}
.date-badge.past-badge{background:var(--border);color:var(--text3);}
.date-line{flex:1;height:1px;background:var(--border);}
.date-line.today-line{background:var(--gold-dim);}

/* MATCH CARD */
.match-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:8px;
  display:grid;grid-template-columns:64px 1fr auto 1fr 90px;align-items:center;gap:10px;
  transition:all .15s;position:relative;overflow:hidden;}
.match-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border);}
.match-card:hover{background:var(--card-hover);border-color:var(--border-bright);}
.match-card.is-today{border-color:var(--gold-dim);box-shadow:0 0 16px rgba(240,165,0,0.1);}
.match-card.is-today::before{background:var(--gold);}
.match-card.is-live{border-color:rgba(255,71,87,0.4);background:linear-gradient(135deg,#0d1426,#140a0d);box-shadow:0 0 16px rgba(255,71,87,0.08);}
.match-card.is-live::before{background:var(--live);}
.match-card.is-past{opacity:.45;}
.match-card.stage-r32::before{background:var(--r32);}
.match-card.stage-r16::before{background:var(--r16);}
.match-card.stage-qf::before{background:var(--qf);}
.match-card.stage-sf::before{background:#a8dadc;}
.match-card.stage-final{border-color:var(--gold-dim);}
.match-card.stage-final::before{background:var(--gold);width:4px;}

/* Time */
.match-time{text-align:center;}
.t-time{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:500;color:var(--gold);line-height:1;}
.t-note{font-size:9px;color:var(--text3);letter-spacing:1px;margin-top:2px;}

/* Team */
.team{display:flex;align-items:center;gap:8px;}
.team.away{flex-direction:row-reverse;}
.team-crest{width:26px;height:26px;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 1px 3px rgba(0,0,0,.5));}
.team-name{font-size:14px;font-weight:700;color:var(--text);}
.team.away .team-name{text-align:right;}

/* Score / VS */
.match-center{text-align:center;flex-shrink:0;min-width:52px;}
.score-box{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--text);line-height:1;}
.score-box.live-score{color:var(--live);text-shadow:0 0 12px rgba(255,71,87,.4);}
.vs-text{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--text3);letter-spacing:2px;}
.status-badge{display:inline-block;padding:2px 5px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:1.5px;margin-top:3px;}
.badge-ft{background:var(--border);color:var(--text3);}
.badge-ht{background:rgba(255,165,0,.2);color:#ffa500;}
.badge-live{background:var(--live-bg);color:var(--live);animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Meta */
.match-meta{text-align:right;}
.match-group{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:1px;background:var(--border);color:var(--text2);margin-bottom:3px;}
.match-group.ko-badge{background:rgba(0,180,216,.1);color:var(--r32);border:1px solid rgba(0,180,216,.25);}
.match-group.final-badge{background:rgba(240,165,0,.1);color:var(--gold);border:1px solid rgba(240,165,0,.25);}
.match-venue{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* Status bar */
.status-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 0 12px;font-size:11px;color:var(--text3);letter-spacing:1px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-right:5px;}
.dot.stale{background:var(--text3);}
.refresh-btn{padding:3px 10px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;border-radius:4px;cursor:pointer;transition:all .15s;}
.refresh-btn:hover{border-color:var(--gold-dim);color:var(--gold);}

/* Loading / Error */
.loading,.error-msg,.empty-state{text-align:center;padding:60px 20px;font-size:16px;color:var(--text3);}
.error-msg{color:var(--live);}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Scroll to today */
.scroll-today-btn{position:fixed;bottom:24px;right:24px;z-index:200;padding:9px 16px;background:var(--gold);color:var(--bg);border:none;border-radius:24px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;box-shadow:0 4px 20px rgba(240,165,0,.3);transition:all .2s;}
.scroll-today-btn:hover{background:var(--gold-light);transform:translateY(-2px);}

/* Footer */
footer{text-align:center;padding:32px 20px;color:var(--text3);font-size:11px;letter-spacing:2px;border-top:1px solid var(--border);position:relative;z-index:1;}

/* RTL */
[dir=rtl] .team{flex-direction:row-reverse;}
[dir=rtl] .team.away{flex-direction:row;}
[dir=rtl] .team-name{text-align:right;}
[dir=rtl] .team.away .team-name{text-align:left;}
[dir=rtl] .match-meta{text-align:left;}
[dir=rtl] .live-clock{text-align:left;}
[dir=rtl] .scroll-today-btn{right:auto;left:24px;}

/* Responsive */
@media(max-width:600px){
  .brand-sub,.live-clock{display:none;}
  .match-card{grid-template-columns:52px 1fr 44px 1fr;gap:6px;padding:10px 12px;}
  .match-meta{display:none;}
  .team-name{font-size:12px;}
  .t-time{font-size:15px;}
  .score-box{font-size:18px;}
}
</style>

// ── State ──
let lang='zh', tzMode='auto', stageFilter='all', groupFilter=null;

function detectBrowserTZ(){
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  if(['Asia/Riyadh','Asia/Kuwait','Asia/Bahrain','Asia/Qatar'].includes(tz)) return 'riyadh';
  if(['Asia/Shanghai','Asia/Chongqing','Asia/Harbin','Asia/Hong_Kong','Asia/Macao','Asia/Macau','Asia/Taipei'].includes(tz)) return 'beijing';
  return 'riyadh';
}
function getEffectiveTZ(){ return tzMode==='auto'?detectBrowserTZ():tzMode; }
function getOffset(){ return TZ_OFFSETS[getEffectiveTZ()]; }

// ── Time utils ──
function utcToLocal(iso){
  return new Date(new Date(iso).getTime()+getOffset()*3600000);
}
function fmtTime(d){ return String(d.getUTCHours()).padStart(2,'0')+':'+String(d.getUTCMinutes()).padStart(2,'0'); }
function fmtKey(d){ return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0'); }
function nowUTCKey(){ return new Date().toISOString().slice(0,10); }
function nowLocalKey(){ return fmtKey(utcToLocal(new Date().toISOString())); }
function isPast(iso){ return new Date(iso)<new Date(); }

// ── API ──
async function fetchMatches(force=false){
  const now=Date.now();
  if(!force&&allMatches.length&&now-lastFetch<CACHE_TTL) return;
  if(!force){
    try{
      const c=JSON.parse(localStorage.getItem(CACHE_KEY)||'{}');
      if(c.ts&&now-c.ts<CACHE_TTL&&c.data?.length){allMatches=c.data;lastFetch=c.ts;return;}
    }catch(e){}
  }
  const res=await fetch(`${WORKER}/api/competitions/WC/matches`);
  if(!res.ok) throw new Error(res.status);
  const json=await res.json();
  allMatches=(json.matches||[]).sort((a,b)=>new Date(a.utcDate)-new Date(b.utcDate));
  lastFetch=Date.now();
  try{localStorage.setItem(CACHE_KEY,JSON.stringify({ts:lastFetch,data:allMatches}));}catch(e){}
}

// ── Render helpers ──
function tName(team){
  const n=team.name||team.shortName||'';
  if(lang==='zh') return TEAM_ZH[n]||TEAM_ZH[team.shortName]||n;
  if(lang==='ar') return TEAM_AR[n]||TEAM_AR[team.shortName]||n;
  return team.shortName||n;
}
function stageLabel(s){ return I18N[lang][s]||s.replace(/_/g,' '); }
function stageCss(s){
  return {ROUND_OF_32:'stage-r32',ROUND_OF_16:'stage-r16',QUARTER_FINALS:'stage-qf',
          SEMI_FINALS:'stage-sf',THIRD_PLACE:'stage-sf',FINAL:'stage-final'}[s]||'';
}
function renderCenter(m){
  const t=I18N[lang];
  const {status,score}=m;
  const isLive=['IN_PLAY','PAUSED'].includes(status);
  const isDone=status==='FINISHED';
  const isHT=status==='HALF_TIME';
  if(isDone||isLive||isHT){
    const h=score.fullTime?.home??score.halfTime?.home??0;
    const a=score.fullTime?.away??score.halfTime?.away??0;
    const badge=isDone?`<div class="status-badge badge-ft">${t['ft-badge']}</div>`
      :isHT?`<div class="status-badge badge-ht">${t['ht-badge']}</div>`
      :`<div class="status-badge badge-live">${t['live-badge']}</div>`;
    return`<div class="score-box${isLive?' live-score':''}">${h}&nbsp;-&nbsp;${a}</div>${badge}`;
  }
  return`<div class="vs-text">VS</div>`;
}

function localDateLabel(key){
  const[y,m,d]=key.split('-').map(Number);
  const dt=new Date(Date.UTC(y,m-1,d));
  const t=I18N[lang];
  if(lang==='ar') return `${d}/${m} ${t.days[dt.getUTCDay()]}`;
  return`${m}月${d}日 ${t.days[dt.getUTCDay()]}`;
}

// ── Render ──
function render(){
  const main=document.getElementById('main');
  const t=I18N[lang];
  const dateMap=new Map();

  for(const m of allMatches){
    if(stageFilter==='group'&&m.stage!=='GROUP_STAGE') continue;
    if(stageFilter==='knockout'&&m.stage==='GROUP_STAGE') continue;
    if(stageFilter==='upcoming'&&isPast(m.utcDate)) continue;
    if(stageFilter==='live'&&!['IN_PLAY','PAUSED','HALF_TIME'].includes(m.status)) continue;
    if(groupFilter&&m.group!==`GROUP_${groupFilter}`) continue;
    const ld=utcToLocal(m.utcDate);
    const key=fmtKey(ld);
    if(!dateMap.has(key)) dateMap.set(key,[]);
    dateMap.get(key).push({m,ld});
  }

  if(!dateMap.size){
    main.innerHTML=`<div class="empty-state">${stageFilter==='live'?'⚽ 暂无直播中比赛':'暂无符合条件的赛事'}</div>`;
    return;
  }

  const ago=lastFetch?Math.round((Date.now()-lastFetch)/1000):null;
  const stale=ago&&ago>180;
  let html=`<div class="status-bar">
    <span><span class="dot${stale?' stale':''}"></span>${t['last-updated']} ${ago?ago+'s':'-'}</span>
    <button class="refresh-btn" onclick="doRefresh()">${t['refresh']}</button>
  </div>`;

  const todayKey=nowLocalKey();
  for(const key of [...dateMap.keys()].sort()){
    const entries=dateMap.get(key);
    const isToday=key===todayKey;
    const allPast=entries.every(e=>e.m.status==='FINISHED');

    html+=`<div class="date-group" id="dg-${key}">`;
    html+=`<div class="date-header">
      <span class="date-label${isToday?' is-today':''}">${localDateLabel(key)}</span>
      ${isToday?`<span class="date-badge today-badge">${t.today}</span>`:allPast?`<span class="date-badge past-badge">${t.finished}</span>`:''}
      <div class="date-line${isToday?' today-line':''}"></div>
    </div>`;

    for(const{m,ld}of entries){
      const isLive=['IN_PLAY','PAUSED','HALF_TIME'].includes(m.status);
      const past=m.status==='FINISHED';
      const utcKey=m.utcDate.slice(0,10);
      const ldKey=fmtKey(ld);
      const nextDay=ldKey>utcKey;

      const cls=['match-card',
        isToday&&!past?'is-today':'',
        isLive?'is-live':'',
        past?'is-past':'',
        stageCss(m.stage)
      ].filter(Boolean).join(' ');

      const badge=m.group
        ?`<span class="match-group">${m.group.replace('GROUP_','')}</span>`
        :m.stage==='FINAL'
          ?`<span class="match-group final-badge">${stageLabel(m.stage)}</span>`
          :`<span class="match-group ko-badge">${stageLabel(m.stage)}</span>`;

      const hn=tName(m.homeTeam), an=tName(m.awayTeam);
      const hc=m.homeTeam.crest||'', ac=m.awayTeam.crest||'';

      html+=`<div class="${cls}">
        <div class="match-time">
          <div class="t-time">${fmtTime(ld)}</div>
          ${nextDay?`<div class="t-note">${t['next-day']}</div>`:''}
        </div>
        <div class="team home">
          ${hc?`<img class="team-crest" src="${hc}" alt="${hn}" onerror="this.style.display='none'">` :''}
          <span class="team-name">${hn}</span>
        </div>
        <div class="match-center">${renderCenter(m)}</div>
        <div class="team away">
          ${ac?`<img class="team-crest" src="${ac}" alt="${an}" onerror="this.style.display='none'">` :''}
          <span class="team-name">${an}</span>
        </div>
        <div class="match-meta">
          ${badge}
          <div class="match-venue">${m.venue||''}</div>
        </div>
      </div>`;
    }
    html+='</div>';
  }
  main.innerHTML=html;
  applyI18N();
}

async function doRefresh(){
  try{await fetchMatches(true);render();}catch(e){
    document.getElementById('main').innerHTML=`<div class="error-msg">${I18N[lang].error}</div>`;
  }
}

// ── TZ ──
function setTZ(mode){
  tzMode=mode;
  ['auto','riyadh','beijing'].forEach(b=>document.getElementById('btn-'+b).classList.toggle('active',b===mode));
  updateSlider(); updateClockLabel();
  if(allMatches.length) render();
}
function updateSlider(){
  const tog=document.getElementById('tzToggle');
  const sl=document.getElementById('tzSlider');
  const idx=['auto','riyadh','beijing'].indexOf(tzMode);
  const btn=tog.querySelectorAll('.tz-btn')[idx];
  if(btn){sl.style.left=btn.offsetLeft+'px';sl.style.width=btn.offsetWidth+'px';}
}
function updateClockLabel(){
  const t=I18N[lang]; const eff=getEffectiveTZ();
  document.getElementById('clockLabel').textContent=
    tzMode==='auto'?`${t['tz-auto']} · ${t['tz-'+eff]}`:t['tz-'+tzMode]||tzMode;
}

// ── Lang ──
function setLang(l){
  lang=l;
  document.documentElement.lang=l==='ar'?'ar':l==='zh'?'zh-CN':'en';
  document.documentElement.dir=l==='ar'?'rtl':'ltr';
  document.querySelectorAll('.lang-btn').forEach(b=>
    b.classList.toggle('active',b.textContent.trim()==={zh:'中文',en:'EN',ar:'عربي'}[l]));
  applyI18N(); updateClockLabel();
  if(allMatches.length) render();
}
function applyI18N(){
  const t=I18N[lang];
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.getAttribute('data-i18n');
    if(t[k]) el.textContent=t[k];
  });
}

// ── Filters ──
function filterStage(s,btn){
  stageFilter=s; groupFilter=null;
  document.querySelectorAll('.filt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(allMatches.length) render();
}
function filterGroup(g,btn){
  if(groupFilter===g){
    groupFilter=null; stageFilter='all';
    document.querySelectorAll('.filt-btn').forEach(b=>b.classList.remove('active'));
    document.querySelector('.filt-btn').classList.add('active');
  }else{
    groupFilter=g; stageFilter='all';
    document.querySelectorAll('.filt-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  }
  if(allMatches.length) render();
}

// ── Scroll ──
function scrollToToday(){
  const el=document.getElementById('dg-'+nowLocalKey());
  if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
}

// ── Clock ──
function updateClock(){
  const off=getOffset();
  const utcMs=Date.now()+new Date().getTimezoneOffset()*60000;
  const ld=new Date(utcMs+off*3600000);
  const h=String(ld.getHours()).padStart(2,'0');
  const m=String(ld.getMinutes()).padStart(2,'0');
  const s=String(ld.getSeconds()).padStart(2,'0');
  document.getElementById('clockTime').textContent=`${h}:${m}:${s}`;
}

// ── Init ──
async function init(){
  setTZ('auto');
  applyI18N();
  setInterval(updateClock,1000);
  updateClock();
  try{
    await fetchMatches();
    render();
    setTimeout(scrollToToday,400);
  }catch(e){
    document.getElementById('main').innerHTML=
      `<div class="error-msg">${I18N[lang].error}<br><br>
       <button class="refresh-btn" style="margin:12px auto;display:block" onclick="doRefresh()">${I18N[lang].refresh}</button></div>`;
  }
  setInterval(async()=>{try{await fetchMatches();render();}catch(e){}},60000);
  setTimeout(updateSlider,300);
  window.addEventListener('resize',updateSlider);
}
init();
</script>
