<!DOCTYPE html>
<html lang="zh-CN" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#030711;--bg2:#080f1f;--card:#0d1426;--card-hover:#111b33;
  --border:#1c2a4a;--border-b:#2a3f6a;
  --gold:#f0a500;--gold-d:#a07010;--gold-l:#ffd166;
  --text:#dde3f0;--t2:#7888aa;--t3:#4a5a7a;
  --live:#ff4757;--live-bg:rgba(255,71,87,.12);
  --green:#2ecc71;--r32:#00b4d8;--r16:#48cae4;--qf:#90e0ef;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(240,165,0,.07) 0%,transparent 70%),
             radial-gradient(ellipse 60% 40% at 20% 100%,rgba(0,50,120,.12) 0%,transparent 60%),
             radial-gradient(ellipse 60% 40% at 80% 100%,rgba(0,50,120,.12) 0%,transparent 60%);
  pointer-events:none;z-index:0;}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:rgba(3,7,17,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.hd{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:10px;padding:10px 20px;flex-wrap:wrap;}
.brand{flex:1;min-width:140px;}
.brand-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--gold);line-height:1;}
.brand-sub{font-size:10px;font-weight:500;color:var(--t2);letter-spacing:3px;text-transform:uppercase;margin-top:1px;}
.hd-ctrls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}

/* lang */
.lang-grp{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.lang-btn{padding:5px 10px;border:none;background:transparent;color:var(--t2);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;}
.lang-btn.on{background:var(--gold);color:var(--bg);}
.lang-btn:not(.on):hover{color:var(--text);}

/* tz */
.tz-grp{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:6px;overflow:hidden;position:relative;}
.tz-btn{padding:5px 11px;border:none;background:transparent;color:var(--t2);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;position:relative;z-index:1;transition:color .15s;}
.tz-btn.on{color:var(--bg);}
.tz-sl{position:absolute;top:2px;bottom:2px;background:var(--gold);border-radius:4px;transition:left .25s cubic-bezier(.4,0,.2,1),width .25s;pointer-events:none;}

/* clock */
.clock{font-family:'JetBrains Mono',monospace;text-align:right;min-width:88px;}
.clock-lbl{font-size:9px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;}
.clock-t{font-size:15px;font-weight:500;color:var(--text);}

/* FILTERS */
.fbar{position:sticky;top:61px;z-index:90;background:rgba(3,7,17,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.fbar-inner{max-width:960px;margin:0 auto;display:flex;gap:4px;padding:8px 20px;overflow-x:auto;scrollbar-width:none;}
.fbar-inner::-webkit-scrollbar{display:none;}
.fb{padding:4px 12px;border:1px solid var(--border);background:transparent;color:var(--t2);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;border-radius:20px;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.fb:hover{border-color:var(--gold-d);color:var(--gold);}
.fb.on{background:var(--gold);border-color:var(--gold);color:var(--bg);}
.fb-sep{width:1px;background:var(--border);margin:0 4px;flex-shrink:0;}

/* MAIN */
main{max-width:960px;margin:0 auto;padding:20px;position:relative;z-index:1;}

/* SCORE STATUS BAR */
.score-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 0 12px;font-size:11px;color:var(--t3);letter-spacing:1px;}
.score-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:5px;background:var(--t3);}
.score-dot.ok{background:var(--green);}
.score-dot.live-dot{background:var(--live);animation:pulse 1s ease-in-out infinite;}
.score-btn{padding:3px 10px;border:1px solid var(--border);background:transparent;color:var(--t2);font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;border-radius:4px;cursor:pointer;transition:all .15s;}
.score-btn:hover{border-color:var(--gold-d);color:var(--gold);}

/* DATE GROUP */
.dg{margin-bottom:28px;}
.dg.hidden{display:none;}
.dg-hd{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.dg-lbl{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--text);}
.dg-lbl.today{color:var(--gold);}
.dg-badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:2px;}
.dg-badge.t{background:var(--gold);color:var(--bg);}
.dg-badge.p{background:var(--border);color:var(--t3);}
.dg-line{flex:1;height:1px;background:var(--border);}
.dg-line.today{background:var(--gold-d);}

/* MATCH CARD */
.mc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:8px;
  display:grid;grid-template-columns:62px 1fr auto 1fr 88px;align-items:center;gap:10px;
  transition:all .15s;position:relative;overflow:hidden;}
.mc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border);}
.mc:hover{background:var(--card-hover);border-color:var(--border-b);}
.mc.today{border-color:var(--gold-d);box-shadow:0 0 16px rgba(240,165,0,.1);}
.mc.today::before{background:var(--gold);}
.mc.live-card{border-color:rgba(255,71,87,.35);background:linear-gradient(135deg,#0d1426,#140a0d);}
.mc.live-card::before{background:var(--live);}
.mc.past{opacity:.42;}
.mc.s-r32::before{background:var(--r32);}
.mc.s-r16::before{background:var(--r16);}
.mc.s-qf::before{background:var(--qf);}
.mc.s-sf::before{background:#a8dadc;}
.mc.s-final{border-color:var(--gold-d);}
.mc.s-final::before{background:var(--gold);width:4px;}

/* time col */
.mt{text-align:center;}
.mt-t{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:500;color:var(--gold);line-height:1;}
.mt-n{font-size:9px;color:var(--t3);letter-spacing:1px;margin-top:2px;}

/* team */
.team{display:flex;align-items:center;gap:8px;}
.team.away{flex-direction:row-reverse;}
.crest{width:26px;height:26px;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 1px 3px rgba(0,0,0,.5));}
.tname{font-size:14px;font-weight:700;color:var(--text);}
.team.away .tname{text-align:right;}
.tbd{color:var(--t3);font-style:italic;font-size:13px;}

/* center */
.ctr{text-align:center;flex-shrink:0;min-width:54px;}
.score{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--text);line-height:1;}
.score.live{color:var(--live);text-shadow:0 0 12px rgba(255,71,87,.4);}
.vstext{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--t3);letter-spacing:2px;}
.sbadge{display:inline-block;padding:2px 5px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:1.5px;margin-top:3px;}
.sb-ft{background:var(--border);color:var(--t3);}
.sb-ht{background:rgba(255,165,0,.2);color:#ffa500;}
.sb-live{background:var(--live-bg);color:var(--live);animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* meta */
.meta{text-align:right;}
.mg{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:1px;background:var(--border);color:var(--t2);margin-bottom:3px;}
.mg.ko{background:rgba(0,180,216,.1);color:var(--r32);border:1px solid rgba(0,180,216,.25);}
.mg.fin{background:rgba(240,165,0,.1);color:var(--gold);border:1px solid rgba(240,165,0,.25);}
.venue{font-size:10px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* scroll btn */
.go-today{position:fixed;bottom:24px;right:24px;z-index:200;padding:9px 16px;background:var(--gold);color:var(--bg);border:none;border-radius:24px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;box-shadow:0 4px 20px rgba(240,165,0,.3);transition:all .2s;}
.go-today:hover{background:var(--gold-l);transform:translateY(-2px);}

/* empty */
.empty{text-align:center;padding:60px 20px;font-size:16px;color:var(--t3);}

footer{text-align:center;padding:32px 20px;color:var(--t3);font-size:11px;letter-spacing:2px;border-top:1px solid var(--border);position:relative;z-index:1;}

/* RTL */
[dir=rtl] .team{flex-direction:row-reverse;}
[dir=rtl] .team.away{flex-direction:row;}
[dir=rtl] .tname{text-align:right;}
[dir=rtl] .team.away .tname{text-align:left;}
[dir=rtl] .meta{text-align:left;}
[dir=rtl] .clock{text-align:left;}
[dir=rtl] .go-today{right:auto;left:24px;}

@media(max-width:600px){
  .brand-sub,.clock{display:none;}
  .mc{grid-template-columns:50px 1fr 46px 1fr;gap:6px;padding:10px 12px;}
  .meta{display:none;}
  .tname{font-size:12px;}
  .mt-t{font-size:15px;}
  .score{font-size:18px;}
}
</style>
</head>

    <button class="fb" onclick="fGroup('D',this)">D</button>
    <button class="fb" onclick="fGroup('E',this)">E</button>
    <button class="fb" onclick="fGroup('F',this)">F</button>
    <button class="fb" onclick="fGroup('G',this)">G</button>
    <button class="fb" onclick="fGroup('H',this)">H</button>
    <button class="fb" onclick="fGroup('I',this)">I</button>
    <button class="fb" onclick="fGroup('J',this)">J</button>
    <button class="fb" onclick="fGroup('K',this)">K</button>
    <button class="fb" onclick="fGroup('L',this)">L</button>
  </div>
</div>

<main id="main"></main>
<button class="go-today" onclick="goToday()" data-t="btn-today">📍 今日</button>

let lang='zh', tzMode='auto', stageF='all', groupF=null;
// Live score overlay: Map<id, {status, home, away}>
const scores = new Map();
let scoreStatus = 'idle'; // idle | ok | fail | live

// ════════════════════════════════════════════════
// TZ
// ════════════════════════════════════════════════
const TZ_OFF = {riyadh:3, beijing:8};
function detBrowserTZ(){
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  if(['Asia/Riyadh','Asia/Kuwait','Asia/Bahrain','Asia/Qatar'].includes(tz)) return 'riyadh';
  if(['Asia/Shanghai','Asia/Chongqing','Asia/Harbin','Asia/Hong_Kong','Asia/Macao','Asia/Macau','Asia/Taipei'].includes(tz)) return 'beijing';
  return 'riyadh';
}
function effTZ(){ return tzMode==='auto'?detBrowserTZ():tzMode; }
function off(){ return TZ_OFF[effTZ()]; }
function toLocal(iso){ return new Date(new Date(iso).getTime()+off()*3600000); }
function fmtTime(d){ return String(d.getUTCHours()).padStart(2,'0')+':'+String(d.getUTCMinutes()).padStart(2,'0'); }
function fmtKey(d){ return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0'); }
function nowLocalKey(){ return fmtKey(toLocal(new Date().toISOString())); }
function isPast(iso){ return new Date(iso)<new Date(); }

// ════════════════════════════════════════════════
// SCORE FETCH (独立，失败不影响赛程显示)
// ════════════════════════════════════════════════
async function fetchScores(){
  try{
    const r = await fetch('https://world-cup-proxy.bekitty.workers.dev/api/competitions/WC/matches',{signal:AbortSignal.timeout(8000)});
    if(!r.ok) throw new Error(r.status);
    const j = await r.json();
    let hasLive=false;
    for(const m of (j.matches||[])){
      const s = m.status;
      const isLive = ['IN_PLAY','PAUSED','HALF_TIME'].includes(s);
      if(isLive) hasLive=true;
      scores.set(m.id,{
        status:s,
        home:m.score?.fullTime?.home??m.score?.halfTime?.home??null,
        away:m.score?.fullTime?.away??m.score?.halfTime?.away??null,
        // knockout teams may now be known
        hName:m.homeTeam?.shortName||m.homeTeam?.name||null,
        aName:m.awayTeam?.shortName||m.awayTeam?.name||null,
        hCrest:m.homeTeam?.crest||null,
        aCrest:m.awayTeam?.crest||null,
      });
    }
    scoreStatus = hasLive?'live':'ok';
    updateScoreOverlay();
    updateScoreBar();
  }catch(e){
    scoreStatus='fail';
    updateScoreBar();
  }
}

// Patch score cells without full re-render
function updateScoreOverlay(){
  for(const [id,s] of scores){
    const ctr = document.getElementById('ctr-'+id);
    if(!ctr) continue;
    const card = document.getElementById('mc-'+id);
    const isLive=['IN_PLAY','PAUSED'].includes(s.status);
    const isDone=s.status==='FINISHED';
    const isHT=s.status==='HALF_TIME';
    const t=T[lang];
    if(isDone||isLive||isHT){
      const h=s.home??0, a=s.away??0;
      const badge=isDone?`<div class="sbadge sb-ft">${t.ft}</div>`
        :isHT?`<div class="sbadge sb-ht">${t.ht}</div>`
        :`<div class="sbadge sb-live">${t.live}</div>`;
      ctr.innerHTML=`<div class="score${isLive?' live':''}">${h}&nbsp;-&nbsp;${a}</div>${badge}`;
      if(card){
        card.classList.toggle('live-card',isLive);
        card.classList.toggle('past',isDone&&!isLive);
      }
    }
    // Update knockout team names/crests if now known
    if(s.hName){
      const hEl=document.getElementById('hn-'+id);
      const hCr=document.getElementById('hc-'+id);
      if(hEl){ hEl.textContent=tName(s.hName); hEl.classList.remove('tbd'); }
      if(hCr&&s.hCrest){ hCr.src=s.hCrest; hCr.style.display=''; }
    }
    if(s.aName){
      const aEl=document.getElementById('an-'+id);
      const aCr=document.getElementById('ac-'+id);
      if(aEl){ aEl.textContent=tName(s.aName); aEl.classList.remove('tbd'); }
      if(aCr&&s.aCrest){ aCr.src=s.aCrest; aCr.style.display=''; }
    }
  }
}

function updateScoreBar(){
  const bar=document.getElementById('scoreBar');
  if(!bar) return;
  const t=T[lang];
  const dotCls=scoreStatus==='ok'?'ok':scoreStatus==='live'?'live-dot':'';
  const msg=scoreStatus==='ok'?t['score-ok']:scoreStatus==='live'?t['score-live']:scoreStatus==='fail'?t['score-fail']:'';
  bar.innerHTML=`<span><span class="score-dot ${dotCls}"></span>${msg}</span>
    <button class="score-btn" onclick="fetchScores()">${t.refresh}</button>`;
}

// ════════════════════════════════════════════════
// RENDER (runs immediately from static data)
// ════════════════════════════════════════════════
function tName(n){
  if(!n) return null;
  if(lang==='zh') return TEAM_ZH[n]||n;
  if(lang==='ar') return TEAM_AR[n]||n;
  return n;
}
function stgLbl(s){ return T[lang][s]||s.replace(/_/g,' '); }
function stgCss(s){
  return {LAST_32:'s-r32',LAST_16:'s-r16',QUARTER_FINALS:'s-qf',SEMI_FINALS:'s-sf',THIRD_PLACE:'s-sf',FINAL:'s-final'}[s]||'';
}
function dateLbl(key){
  const[y,m,d]=key.split('-').map(Number);
  const dt=new Date(Date.UTC(y,m-1,d));
  const t=T[lang];
  return lang==='ar'?`${d}/${m} ${t.days[dt.getUTCDay()]}`:
         `${m}月${d}日 ${t.days[dt.getUTCDay()]}`;
}

function render(){
  const main=document.getElementById('main');
  const t=T[lang];
  const todayKey=nowLocalKey();
  const dateMap=new Map();

  for(const row of SCHEDULE){
    const[id,iso,stage,group,hN,hC,aN,aC]=row;
    // filters
    if(stageF==='group'&&stage!=='GROUP_STAGE') continue;
    if(stageF==='ko'&&stage==='GROUP_STAGE') continue;
    if(stageF==='up'&&isPast(iso)) continue;
    if(stageF==='live'){
      const sc=scores.get(id);
      if(!sc||!['IN_PLAY','PAUSED','HALF_TIME'].includes(sc.status)) continue;
    }
    if(groupF&&group!==`GROUP_${groupF}`) continue;

    const ld=toLocal(iso);
    const key=fmtKey(ld);
    if(!dateMap.has(key)) dateMap.set(key,[]);
    dateMap.get(key).push({id,iso,stage,group,hN,hC,aN,aC,ld});
  }

  if(!dateMap.size){
    main.innerHTML=`<div class="empty">${stageF==='live'?'⚽ 暂无直播中赛事':'暂无符合条件的赛事'}</div>`;
    return;
  }

  let html=`<div class="score-bar" id="scoreBar">
    <span><span class="score-dot"></span></span>
    <button class="score-btn" onclick="fetchScores()">${t.refresh}</button>
  </div>`;

  for(const key of [...dateMap.keys()].sort()){
    const items=dateMap.get(key);
    const isToday=key===todayKey;
    const allDone=items.every(i=>scores.has(i.id)&&scores.get(i.id).status==='FINISHED');

    html+=`<div class="dg" id="dg-${key}">`;
    html+=`<div class="dg-hd">
      <span class="dg-lbl${isToday?' today':''}">${dateLbl(key)}</span>
      ${isToday?`<span class="dg-badge t">${t.today}</span>`:allDone?`<span class="dg-badge p">${t.finished}</span>`:''}
      <div class="dg-line${isToday?' today':''}"></div>
    </div>`;

    for(const{id,iso,stage,group,hN,hC,aN,aC,ld}of items){
      const sc=scores.get(id);
      const isLive=sc&&['IN_PLAY','PAUSED'].includes(sc.status);
      const isDone=sc&&sc.status==='FINAL'||sc?.status==='FINISHED';
      const nextDay=fmtKey(ld)>iso.slice(0,10);
      const hasTms=hN&&aN;

      const cls=['mc',isToday&&!isDone?'today':'',isLive?'live-card':'',isDone?'past':'',stgCss(stage)].filter(Boolean).join(' ');
      const badge=group
        ?`<span class="mg">${group.replace('GROUP_','')}</span>`
        :stage==='FINAL'?`<span class="mg fin">${stgLbl(stage)}</span>`
        :`<span class="mg ko">${stgLbl(stage)}</span>`;

      // center: score if available, else VS
      let ctrHtml=`<div class="vstext">VS</div>`;
      if(sc){
        const isL=['IN_PLAY','PAUSED'].includes(sc.status);
        const isDn=sc.status==='FINISHED';
        const isH=sc.status==='HALF_TIME';
        if(isDn||isL||isH){
          const h=sc.home??0,a=sc.away??0;
          ctrHtml=`<div class="score${isL?' live':''}">${h}&nbsp;-&nbsp;${a}</div>`
            +(isDn?`<div class="sbadge sb-ft">${t.ft}</div>`
              :isH?`<div class="sbadge sb-ht">${t.ht}</div>`
              :`<div class="sbadge sb-live">${t.live}</div>`);
        }
      }

      // teams — handle TBD knockout slots
      const hName=tName(hN)||t.tbd;
      const aName=tName(aN)||t.tbd;
      const hTbd=!hN;
      const aTbd=!aN;

      html+=`<div class="${cls}" id="mc-${id}">
        <div class="mt">
          <div class="mt-t">${fmtTime(ld)}</div>
          ${nextDay?`<div class="mt-n">${t['next-day']}</div>`:''}
        </div>
        <div class="team home">
          ${hC?`<img class="crest" id="hc-${id}" src="${hC}" alt="${hName}" onerror="this.style.display='none'">`:hTbd?'':`<img class="crest" id="hc-${id}" style="display:none">`}
          <span class="tname${hTbd?' tbd':''}" id="hn-${id}">${hName}</span>
        </div>
        <div class="ctr" id="ctr-${id}">${ctrHtml}</div>
        <div class="team away">
          ${aC?`<img class="crest" id="ac-${id}" src="${aC}" alt="${aName}" onerror="this.style.display='none'">`:aTbd?'':`<img class="crest" id="ac-${id}" style="display:none">`}
          <span class="tname${aTbd?' tbd':''}" id="an-${id}">${aName}</span>
        </div>
        <div class="meta">${badge}</div>
      </div>`;
    }
    html+='</div>';
  }
  main.innerHTML=html;
  applyT();
  updateScoreBar();
  if(scores.size) updateScoreOverlay();
}

  tzMode=m;

  updSlider(); updClkLbl();

  const g=document.getElementById('tzg'),sl=document.getElementById('tzsl');

  if(btn){sl.style.left=btn.offsetLeft+'px';sl.style.width=btn.offsetWidth+'px';}

  lang=l;

  document.documentElement.dir=l==='ar'?'rtl':'ltr';
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('on',b.textContent.trim()==={zh:'中文',en:'EN',ar:'عربي'}[l]));
  try{const u=new URL(location.href);u.searchParams.set('lang',l);history.replaceState(null,'',u);}catch(e){}
  applyT(); updClkLbl(); render();
}
function applyT(){
  const t=T[lang];
  document.querySelectorAll('[data-t]').forEach(el=>{
    const k=el.getAttribute('data-t');
    if(t[k]) el.textContent=t[k];
  });
}

// ════════════════════════════════════════════════
// FILTERS
// ════════════════════════════════════════════════
function fStage(s,btn){
  stageF=s;groupF=null;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}
function fGroup(g,btn){
  if(groupF===g){
    groupF=null;stageF='all';
    document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
    document.querySelector('.fb').classList.add('on');
  }else{
    groupF=g;stageF='all';
    document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
  }
  render();
}
function goToday(){
  const el=document.getElementById('dg-'+nowLocalKey());
  if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
}

// ════════════════════════════════════════════════
// CLOCK
// ════════════════════════════════════════════════
function tick(){
  const o=off(),n=Date.now(),tz=new Date().getTimezoneOffset();
  const ld=new Date(n+tz*60000+o*3600000);
  document.getElementById('clkT').textContent=
    String(ld.getHours()).padStart(2,'0')+':'+String(ld.getMinutes()).padStart(2,'0')+':'+String(ld.getSeconds()).padStart(2,'0');
}

// ════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════
setTZ('auto');
const _urlLang=new URLSearchParams(location.search).get('lang');
if(_urlLang&&['zh','en','ar'].includes(_urlLang)) setLang(_urlLang);  // 按 URL 里的语言初始化
applyT();
render();                         // 立即渲染赛程（不依赖网络）
setTimeout(goToday,300);          // 跳到今天
setInterval(tick,1000); tick();   // 时钟
fetchScores();                    // 后台静默获取比分
setInterval(fetchScores,60000);   // 每分钟刷新比分
setTimeout(updSlider,300);
window.addEventListener('resize',updSlider);
</script>
</body>
